naftiko: 1.0.0-alpha2
info:
  label: Dexterity Foresight Packing Challenge — Player And Leaderboard
  description: 'Capability for managing a competitor''s public identity and tracking standings on the Foresight Packing Challenge leaderboard. Wraps the my-games, display-name, and leaderboard endpoints to support post-run analysis, identity management, and ranking dashboards. Self-contained Naftiko capability.'
  tags:
  - Dexterity
  - Foresight
  - PackingChallenge
  - Leaderboard
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    DEXTERITY_API_KEY: DEXTERITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: dexterity-foresight
    baseUri: https://dexterity.ai/challenge/api
    description: Foresight Packing Challenge REST API — player and leaderboard endpoints.
    resources:
    - name: my-games
      path: /my-games
      operations:
      - name: getmygames
        method: GET
        description: List a player's games filtered by mode and status, plus aggregate summary statistics.
        outputRawFormat: json
        outputParameters:
        - name: summary
          type: object
          value: $.summary
        - name: games
          type: array
          value: $.games
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
        - name: mode
          in: query
          type: string
          required: false
        - name: status
          in: query
          type: string
          required: false
    - name: display-name
      path: /display-name
      operations:
      - name: updatedisplayname
        method: POST
        description: Update the public display name associated with an API key for the leaderboard.
        outputRawFormat: json
        outputParameters:
        - name: display_name
          type: string
          value: $.display_name
        inputParameters:
        - name: body
          in: body
          type: object
          description: 'Required keys: api_key, display_name.'
          required: true
    - name: leaderboard
      path: /leaderboard
      operations:
      - name: getleaderboard
        method: GET
        description: Retrieve the public Foresight Packing Challenge leaderboard.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
