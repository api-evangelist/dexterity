apis:
  - aid: dexterity:dexterity-foresight-packing-challenge
    name: Dexterity Foresight Packing Challenge API
    description: >-
      Public REST API exposing the Foresight Packing Challenge as a sequential 3D bin-packing problem. Autonomous agents
      start a game, place boxes sequentially inside a 2.0m x 2.6m x 2.75m truck, and submit final packing density scores
      to a public leaderboard. Two modes are supported: dev (unlimited, physics-free testing) and compete (full physics
      simulation with a 50 games/day per-API-key cap). API keys are issued by reaching at least 50% density in the
      public Truck Loading Game; full leaderboard participation and the 50,000 USD grand prize are restricted to .edu
      (or equivalent university) email holders. Interactive Swagger docs live at /challenge/api/docs.
    humanURL: https://dexterity.ai/challenge
    baseURL: https://dexterity.ai/challenge/api
