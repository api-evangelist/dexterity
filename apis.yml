aid: dexterity
name: Dexterity
description: >-
  Dexterity is a Redwood City, California Physical AI company founded in 2017 by Samir Menon and a group of Stanford
  roboticists. It builds a full-stack industrial robotics platform that combines the Mech — a roving, dual-arm
  superhumanoid robot — with Foresight, an in-house world model trained on more than 100 million autonomous actions in
  production. Foresight orchestrates 68+ skill agents (packing, motion, actualization, trajectory, force-control) across
  the IRIS hardware abstraction layer to drive Kawasaki arms, HiWin motion components, and Dexterity's own mobile bases
  at sub-400ms decision latency with zero reported safety incidents. Customers include FedEx, UPS, Sagawa Express,
  Maersk, and VFC, and the company has raised more than 291M USD from Kleiner Perkins, Lightspeed Venture Partners,
  Obvious Ventures, Sumitomo Corporation, and B37 Ventures. Dexterity's commercial offering is enterprise Physical AI
  deployment (no self-service developer API), but it does run a public, research-grade REST API — the Foresight Packing
  Challenge — that exposes the bin-packing facet of Foresight as a programmable sequential placement game, with a 50,000
  USD grand prize and participation restricted to .edu email holders.
